<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Portal | Complaint Box</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/landing.css"> </head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="landing-container">
        <header class="hero-section">
            <span class="logo-icon">⬡</span>
            <h1>College Support Portal</h1>
            <p>A secure space for students to voice concerns and track resolutions.</p>
        </header>

        <div class="action-cards">
            <a href="/submit" class="portal-card">
                <div class="card-icon">✍️</div>
                <h3>File a Complaint</h3>
                <p>Submit a new issue anonymously or with your details.</p>
                <span class="btn-text">Get Started →</span>
            </a>

            <a href="/track" class="portal-card">
                <div class="card-icon">🔍</div>
                <h3>Track Status</h3>
                <p>Check the progress of a previously submitted complaint.</p>
                <span class="btn-text">Check ID →</span>
            </a>
        </div>

        <footer style="margin-top: 60px; text-align: center;">
            <a href="/login" class="btn btn-ghost btn-sm">Staff & Admin Login →</a>
        </footer>
    </div>
</body>

</html>
